<!DOCTYPE html>
<html>
<head>
  <title>3D Floor Plan Viewer</title>
  <style>
    body { margin: 0; overflow: hidden; font-family: sans-serif; }
    #ui { position: absolute; top: 10px; left: 10px; background: rgba(255,255,255,0.9); padding: 15px; border-radius: 8px; z-index: 10; max-height: 90vh; overflow-y: auto; width: 300px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    #canvas-container { width: 100vw; height: 100vh; }
    button { margin-top: 10px; padding: 8px; cursor: pointer; width: 100%; }
    input[type="file"], input[type="number"] { margin-top: 5px; margin-bottom: 10px; width: 100%; box-sizing: border-box; }
    hr { margin: 15px 0; border: 0; border-top: 1px solid #ccc; }
    .hidden { display: none; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
  <div id="ui">
    <h3>3D Floor Plan Creator</h3>
    <label>1. Layout Image (Optional): <input type="file" id="imageInput" accept="image/*"></label>
    <label>2. JSON Data: <input type="file" id="jsonInput" accept=".json"></label>
    
    <div id="controls" class="hidden">
      <hr>
      <label style="display: flex; align-items: center; cursor: pointer; font-weight: bold;">
        <input type="checkbox" id="solidDoorsCheck" style="width: auto; margin-right: 8px;">
        Render Solid Doors
      </label>
      <hr>
      <h4>Camera Controls</h4>
      <p style="font-size: 12px; color: #555;">(Or use mouse to orbit)</p>
      <label>Height (m): <input type="number" id="camHeight" value="1.8" step="0.1"></label>
      <label>X pos: <input type="number" id="camX" value="0" step="1"></label>
      <label>Y pos (2D map): <input type="number" id="camY" value="0" step="1"></label>
      <label>Look Angle (deg): <input type="number" id="camAngle" value="0" step="15"></label>
      <button id="updateCamBtn">Set Camera View</button>
      <button id="resetCamBtn">Reset Orbit</button>
      <hr>
      <button id="exportBtn" style="background: #4CAF50; color: white; border: none; font-weight: bold;">Export Rendered Image</button>
    </div>
  </div>
  <div id="canvas-container"></div>
  <script src="app.js"></script>
</body>
</html>
